<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — GlobalTalentHub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f2444 0%,#152d57 60%,#1a3a6e 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:24px;padding:48px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,0.35);}
.logo{width:60px;height:60px;background:#0f2444;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;}
h1{text-align:center;font-size:24px;font-weight:800;color:#0f2444;margin-bottom:6px;}
.sub{text-align:center;color:#64748b;font-size:14px;margin-bottom:32px;}
label{display:block;font-weight:600;font-size:13px;color:#334155;margin-bottom:7px;}
input[type=password]{width:100%;padding:13px 16px;border-radius:12px;border:2px solid #e2e8f0;font-size:15px;font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.18s;}
input[type=password]:focus{border-color:#0f2444;box-shadow:0 0 0 3px rgba(15,36,68,0.1);}
input.error{border-color:#dc2626;}
.err-msg{color:#dc2626;font-size:13px;margin-top:8px;font-weight:500;}
.btn{display:block;width:100%;margin-top:22px;padding:14px;border-radius:12px;border:none;background:#0f2444;color:#fff;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:background 0.2s;}
.btn:hover{background:#152d57;}
.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#64748b;text-decoration:none;}
.back-link:hover{color:#0f2444;}
.hint{margin-top:20px;padding:12px 16px;background:#f0f9ff;border-radius:10px;font-size:13px;color:#0369a1;}
.hint code{background:#dbeafe;padding:2px 6px;border-radius:4px;font-family:monospace;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake 0.4s ease;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌍</div>
  <h1>Admin Portal</h1>
  <p class="sub">GlobalTalentHub Control Panel</p>

  <form method="POST" action="{{ url_for('admin_login') }}" id="loginForm">
    <label for="password">Admin Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password"
           class="{{ 'error' if error }}" autofocus>
    {% if error %}
    <div class="err-msg" id="errMsg">{{ error }}</div>
    {% endif %}
    <button type="submit" class="btn">Sign In</button>
  </form>

  <a href="{{ url_for('index') }}" class="back-link">← Return to public site</a>

  <div class="hint">
    <strong>Default password:</strong> <code>admin2025</code><br>
    Change it in Settings after first login.
  </div>
</div>

{% if error %}
<script>
  document.getElementById('loginForm').classList.add('shake');
</script>
{% endif %}
</body>
</html>
